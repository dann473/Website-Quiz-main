<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado do Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:ital,wght@0,100..900;1,100..900&family=Geist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/basecoat.cdn.min.css">
    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/all.min.js" defer></script>
    <link href="../output.css" rel="stylesheet">
    <link href="../styles/style.css" rel="stylesheet">
    <link href="../styles/glass.css" rel="stylesheet">
    <link href="../styles/perguntas.css" rel="stylesheet">
</head>
<body>
    <div class="container resultado">
        <div class="logo">
            <img src="../assets/logoVdQ.png" alt="Logo do Quiz NBA">
        </div>

        <div class="resultado-cabecalho">
            <div class="resultado-subtitulo">Seu desempenho</div>
            <div class="resultado-pontuacao" id="resultado-pontuacao">0/6</div>
        </div>

        <div class="resultado-card">
            <div class="resultado-mensagem" id="resultado-mensagem"></div>
            <div class="resultado-lista" id="resultado-lista"></div>
        </div>

        <div class="resultado-acoes">
            <button class="btn-reiniciar" type="button" id="reiniciar-quiz">
                Jogar novamente
            </button>
        </div>
    </div>

    <script type="module" src="../scripts/resultadoQuiz.js"></script>
</body>
</html>
